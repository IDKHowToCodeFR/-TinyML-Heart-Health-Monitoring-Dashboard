name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  # Enables manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://IDKHowToCodeFr:$HF_TOKEN@huggingface.co/spaces/IDKHowToCodeFr/tinyml-backend
          git push --force space main

